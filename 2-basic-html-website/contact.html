        <main>
            <h1>Get In touch!</h1>
                <div class="contact-form">
                <feildset>
                    <legend><h2>Have a question?</h2></legend>
                    <form>
                        <label for="name">Your Name:</label>
                        <input id="name" type="text" name="name" placeholder="Jon Doe"><br>
                        <label for="email">Email:</label>
                        <input id="email" type="email" name="email" placeholder="email@email.com"><br>
                        <label for="message">What would you like to know?</label>
                        <textarea id="message" name="message-box" placeholder="Your text here" height="600" ></textarea><br>
                        <button type="submit">Send</button>
                    </form>
                </feildset>
            </div>
        </main>
        <footer>
